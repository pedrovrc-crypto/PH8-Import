<!DOCTYPE html>

    <title>PH8 Dash - V3</title>
    <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f12;--card:#13161b;--hov:#1a1e25;--inp:#080a0d;
      --b1:#22272e;--b2:#2d3440;
      --t1:#e8eaf0;--t2:#8b909c;--t3:#555c68;
      --acc:#4f8ef7;--ad:#1a3260;
      --ok:#2ecc71;--wa:#f39c12;--er:#e74c3c;--pu:#9b59b6;--te:#1abc9c;--pi:#e91e8c;
      --r:5px;--mono:'DM Mono',monospace;--sans:'Inter',sans-serif;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:13px}
    /* ... (Restante do seu CSS mantido integralmente) ... */
    .app{display:flex;height:740px;border-radius:8px;overflow:hidden;border:1px solid var(--b1);position:relative}
    .sb{width:186px;background:var(--card);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
    .brand{padding:11px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:7px}
    .bm{font-family:var(--mono);font-size:11px;color:var(--acc);background:var(--ad);border:1px solid var(--acc);border-radius:3px;padding:2px 6px}
    .bt{font-family:var(--mono);font-size:10px;color:var(--t2)}
    .ns{padding:3px 0;border-bottom:1px solid var(--b1)}
    .nl{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;padding:5px 11px 1px;font-weight:500}
    .ni{display:flex;align-items:center;gap:6px;padding:5px 11px;color:var(--t2);font-size:12px;cursor:pointer;border-right:2px solid transparent;border:none;background:none;width:100%;text-align:left;transition:all .1s}
    .ni:hover{background:var(--hov);color:var(--t1)}
    .ni.on{background:var(--ad);color:var(--acc);border-right:2px solid var(--acc)}
    .nb{margin-left:auto;font-family:var(--mono);font-size:8px;border-radius:8px;padding:1px 5px;font-weight:600;background:var(--wa);color:#000}
    .nb.er{background:var(--er);color:#fff}
    .nb.ok{background:var(--ok);color:#000}
    .nb.acc{background:var(--acc);color:#fff}
    .sf{margin-top:auto;padding:8px 11px;border-top:1px solid var(--b1);font-size:11px;color:var(--t2)}
    .mn{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
    .tb{height:43px;background:var(--card);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 13px;gap:8px;flex-shrink:0}
    .tt{font-family:var(--mono);font-size:12px;color:var(--t1);flex:1}
    .sl{background:var(--inp);border:1px solid var(--b2);color:var(--t1);border-radius:var(--r);padding:3px 7px;font-size:10px;font-family:var(--mono);cursor:pointer;outline:none}
    .ct{flex:1;padding:12px;overflow-y:auto}
    .kg{display:grid;gap:7px;margin-bottom:10px}
    .kc{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px}
    .kl{font-size:8px;font-weight:600;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:3px}
    .kv{font-family:var(--mono);font-size:19px;font-weight:500;line-height:1}
    .ks{font-size:9px;color:var(--t3);margin-top:2px}
    .card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
    .ch{padding:7px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:8px}
    .ct2{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;font-weight:500}
    .cb{padding:10px}
    .p2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .p3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    thead th{background:var(--bg);color:var(--t3);font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:5px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}
    tbody tr{border-bottom:1px solid var(--b1);transition:background .08s}
    tbody tr:hover{background:var(--hov)}
    tbody td{padding:5px 8px;color:var(--t1);vertical-align:middle}
    .tm{font-family:var(--mono);font-size:10px;color:var(--t2)}
    .td{color:var(--t3);font-size:10px}
    .badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:8px;font-weight:600;padding:1px 5px;border-radius:2px;text-transform:uppercase;white-space:nowrap}
    .bok{background:rgba(46,204,113,.13);color:#2ecc71;border:1px solid rgba(46,204,113,.28)}
    .ber{background:rgba(231,76,60,.13);color:#e74c3c;border:1px solid rgba(231,76,60,.28)}
    .bwa{background:rgba(243,156,18,.13);color:#f39c12;border:1px solid rgba(243,156,18,.28)}
    .bac{background:rgba(79,142,247,.13);color:#4f8ef7;border:1px solid rgba(79,142,247,.28)}
    .bpu{background:rgba(155,89,182,.13);color:#9b59b6;border:1px solid rgba(155,89,182,.28)}
    .bte{background:rgba(26,188,156,.13);color:#1abc9c;border:1px solid rgba(26,188,156,.28)}
    .bne{background:rgba(139,144,156,.08);color:var(--t2);border:1px solid var(--b1)}
    .btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r);font-size:10px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:var(--sans)}
    .btp{background:var(--acc);color:#fff;border-color:var(--acc)}.btp:hover{background:#3d7de8}
    .btg{background:transparent;color:var(--t2);border-color:var(--b2)}.btg:hover{background:var(--hov);color:var(--t1)}
    .bto{background:var(--ok);color:#000;border-color:var(--ok)}
    .btw{background:transparent;color:var(--wa);border-color:var(--wa)}
    .btr{background:transparent;color:var(--er);border-color:var(--er)}
    .bts{padding:3px 8px;font-size:10px}
    .fc{width:100%;background:var(--inp);border:1px solid var(--b2);color:var(--t1);border-radius:var(--r);padding:4px 8px;font-size:11px;font-family:var(--sans);outline:none;transition:border-color .12s}
    .fc:focus{border-color:var(--acc)}.fc::placeholder{color:var(--t3)}.fc:disabled{opacity:.45}
    .fg{margin-bottom:8px}.fl{display:block;font-size:8px;font-weight:600;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
    .mbg{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none;align-items:center;justify-content:center}
    .mbg.open{display:flex}
    .modal{background:var(--card);border:1px solid var(--b2);border-radius:7px;width:96%;max-width:960px;max-height:95%;overflow-y:auto}
    .mh{padding:11px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:2}
    .mt{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--t1)}
    .mc{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;line-height:1}
    .mb{padding:14px}
    .mf{padding:9px 14px;border-top:1px solid var(--b1);display:flex;gap:6px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
    .fl2{padding:6px 9px;border-radius:var(--r);font-size:10px;margin-bottom:8px;border:1px solid transparent;display:flex;align-items:center;gap:5px}
    .fl2.ok{background:rgba(46,204,113,.09);color:var(--ok);border-color:rgba(46,204,113,.25)}
    .fl2.er{background:rgba(231,76,60,.09);color:var(--er);border-color:rgba(231,76,60,.25)}
    .fl2.wa{background:rgba(243,156,18,.09);color:var(--wa);border-color:rgba(243,156,18,.25)}
    .pr{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:3px}
    .pf{height:100%;border-radius:2px}
    .row-l{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--b1);font-size:11px}
    .row-l:last-child{border-bottom:none}
    .tl{display:flex;border-bottom:1px solid var(--b1);padding:0 12px;overflow-x:auto}
    .tab{padding:7px 10px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--t2);background:none;border-top:none;border-left:none;border-right:none;transition:all .1s;white-space:nowrap}
    .tab:hover{color:var(--t1)}.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
    .chkr{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1);cursor:pointer}
    .chkr:last-child{border-bottom:none}
    .chkr input{width:14px;height:14px;margin-top:2px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
    .sco{width:72px;height:72px;border-radius:50%;border:3px solid var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;transition:border-color .3s}
    .info-r{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b1);font-size:10px}
    .info-r:last-child{border-bottom:none}
    .ik{color:var(--t2)}.iv{color:var(--t1);font-family:var(--mono);text-align:right;font-size:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis}
    .sec{font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin:8px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--b1);font-weight:600}
    .cob-tent{display:flex;align-items:center;gap:6px;padding:4px 9px;border-bottom:1px solid var(--b1);font-size:10px}
    .cob-tent:last-child{border-bottom:none}
    .cob-day{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;margin-bottom:7px}
    .cob-dh{padding:5px 9px;border-bottom:1px solid var(--b1);background:rgba(79,142,247,.06);display:flex;align-items:center;justify-content:space-between}
    .ativ-card{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:9px 11px;margin-bottom:7px;display:flex;gap:9px;align-items:flex-start;transition:border-color .15s}
    .ativ-card:hover{border-color:var(--b2)}
    .ativ-card.done{opacity:.5}
    .ativ-prio{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:40px}
    .perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:220px;overflow-y:auto}
    .perm-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t2);cursor:pointer;padding:3px 0}
    .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;flex-shrink:0}
    .scroll-x{overflow-x:auto}
    select.fc option{background:var(--card)}
    </style>
</head>

            <div class="kc" style="border-left:3px solid var(--ok)"><div class="kl">Receita Bruta</div><div class="kv" style="color:var(--ok);font-size:14px">${money(rec)}</div><div class="ks">${ap} aprovados</div></div>
            <div class="kc" style="border-left:3px solid var(--er)"><div class="kl">Devolvidos</div><div class="kv" style="color:var(--er)">${dv}</div><div class="ks">monitorar</div></div>
            <div class="kc" style="border-left:3px solid var(--wa);cursor:pointer" onclick="nav('validacao')"><div class="kl">Val. Pendentes</div><div class="kv" style="color:var(--wa)">${vPend}</div><div class="ks">aguardam decisão</div></div>
            <div class="kc" style="border-left:3px solid var(--acc);cursor:pointer" onclick="nav('atividades')"><div class="kl">Atividades</div><div class="kv" style="color:var(--acc)">${atvPend}</div><div class="ks">pendentes</div></div>
          </div>
          <div class="p2">
            <div class="card">
              <div class="ch"><span class="ct2">Status de entrega</span><button class="btn btg bts" onclick="nav('cobranca')">Cobrança →</button></div>
              <div style="padding:0">
                ${[['Entregue',entregues,'ok'],['Ag. Retirada',agRet,'wa'],['Frustrada',D.filter(r=>r.st_rec==='Frustrada').length,'er'],['A Caminho',D.filter(r=>r.st_rec==='A Caminho').length,'te'],['Postado',D.filter(r=>r.st_rec==='Postado').length,'pu']].map(([l,v,col])=>`
                <div class="row-l" style="padding:5px 12px"><span style="color:var(--t2)">${l}</span><span style="font-family:var(--mono);color:var(--${col})">${v}</span></div>`).join('')}
              </div>
            </div>
            <div class="card">
              <div class="ch"><span class="ct2">Próximas atividades</span><button class="btn btg bts" onclick="nav('atividades')">Ver todas →</button></div>
              <div style="padding:8px">
                ${atvHoje.map(a=>`
                <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--b1);font-size:11px">
                  <div style="width:3px;height:28px;background:${a.prioridade==='alta'?'var(--er)':a.prioridade==='media'?'var(--wa)':'var(--t3)'};border-radius:2px;flex-shrink:0"></div>
                  <div style="flex:1;overflow:hidden">
                    <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.titulo}</div>
                    <div style="color:var(--t3);font-size:9px">${a.data} ${a.hora} · ${a.responsavel}</div>
                  </div>
                  ${tipoBadge(a.tipo)}
                </div>`).join('')}
              </div>
            </div>
          </div>
          <div class="p3">
            <div class="card">
              <div class="ch"><span class="ct2">Validação leads</span><button class="btn btg bts" onclick="nav('validacao')">Ver →</button></div>
              <div style="padding:0">
                ${[['Pendentes',LEADS.filter(l=>l.val.status==='pending').length,'wa'],['Aprovados',LEADS.filter(l=>l.val.status==='approved').length,'ok'],['Rejeitados',LEADS.filter(l=>l.val.status==='rejected').length,'er']].map(([l,v,col])=>`
                <div class="row-l" style="padding:5px 12px"><span style="color:var(--t2)">${l}</span><span style="font-family:var(--mono);color:var(--${col})">${v}</span></div>`).join('')}
              </div>
            </div>
            <div class="card">
              <div class="ch"><span class="ct2">Top estados</span></div>
              <div style="padding:0">
                ${Object.entries(D.reduce((a,r)=>{if(r.estado)a[r.estado]=(a[r.estado]||0)+1;return a;},{})).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([e,n])=>`
                <div class="row-l" style="padding:4px 12px"><span style="color:var(--t2)">${e}</span><span style="font-family:var(--mono);color:var(--acc)">${n}</span></div>`).join('')}
              </div>
            </div>
            <div class="card">
              <div class="ch"><span class="ct2">Ações rápidas</span></div>
              <div class="cb" style="display:flex;flex-direction:column;gap:5px">
                <button class="btn btg" style="justify-content:space-between;font-size:11px" onclick="nav('validacao')">◇ Validação <span class="badge bwa">${vPend} pend.</span></button>
                <button class="btn btg" style="justify-content:space-between;font-size:11px" onclick="nav('cobranca')">◬ Cobrança <span class="badge bwa">${agRet} ag.ret.</span></button>
                <button class="btn btg" style="justify-content:flex-start;font-size:11px" onclick="nav('atividades')">◈ Atividades (${atvPend})</button>
                <button class="btn btg" style="justify-content:flex-start;font-size:11px" onclick="nav('colaboradores')">▤ Colaboradores</button>
              </div>
            </div>
          </div>`;
        }

        // Restante do código original (pgAtividades, pgLeads, pgPedidos, pgValidacao, etc.)
        // [ATENÇÃO: Mantenha exatamente como está no seu arquivo original]

        // ... (Fim das funções de página) ...

        // INICIALIZAÇÃO
        ['sf-status','sf-estado'].forEach(id=>{
          document.getElementById(id).addEventListener('change',()=>nav(curP));
        });
        initFilters();
        document.querySelectorAll('.ni').forEach(i=>i.addEventListener('click',()=>nav(i.dataset.p)));
        nav('dash');
    </script>
</body>
</html>
