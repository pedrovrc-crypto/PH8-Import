function filterAtvs(){
  const q=(document.getElementById('atvsrch')?.value||'').toLowerCase();
  const st=document.getElementById('atvfil')?.value||'';
  const pr=document.getElementById('atvprio')?.value||'';
  document.querySelectorAll('[id^="atv-"]').forEach(el=>{
    const a=ATIVS.find(x=>x.id===parseInt(el.id.split('-')[1]));
    if(!a)return;
    const matchQ=!q||a.titulo.toLowerCase().includes(q)||a.descricao.toLowerCase().includes(q);
    const matchSt=!st||a.status===st;
    const matchPr=!pr||a.prioridade===pr;
    el.style.display=(matchQ&&matchSt&&matchPr)?'':'none';
  });
}

window.concluirAtv=function(id){
  const a=ATIVS.find(x=>x.id===id);if(!a)return;
  a.status='concluida';
  AUDITLOG.unshift({time:new Date().toLocaleString('pt-BR').slice(0,14),user:'João S.',action:'atividade_concluida',entity:'atividades',detail:a.titulo,ip:'177.x.x.1'});
  nav('atividades');showF(`Atividade "${a.titulo}" concluída!`);
};
window.excluirAtv=function(id){
  const a=ATIVS.find(x=>x.id===id);if(!a)return;
  if(!confirm(`Excluir "${a.titulo}"?`))return;
  const idx=ATIVS.indexOf(a);ATIVS.splice(idx,1);
  nav('atividades');showF('Atividade excluída','wa');
};
window.editarAtv=function(id){
  const a=ATIVS.find(x=>x.id===id);if(!a)return;
  openNovaAtividade(a);
};

window.salvarAtv=function(id){
  const titulo=document.getElementById('atv-titulo')?.value.trim();
  const data=document.getElementById('atv-data')?.value.trim();
  if(!titulo||!data){showF('Título e data são obrigatórios','er');return;}
  const obj={
    titulo,
    descricao:document.getElementById('atv-desc')?.value.trim()||'',
    data,hora:document.getElementById('atv-hora')?.value.trim()||'',
    responsavel:document.getElementById('atv-resp')?.value||'Admin',
    tipo:document.getElementById('atv-tipo')?.value||'interno',
    prioridade:document.getElementById('atv-prio')?.value||'media',
    lead_id:parseInt(document.getElementById('atv-lead')?.value)||null,
    status:document.getElementById('atv-status')?.value||'pendente',
  };
  if(id){Object.assign(ATIVS.find(x=>x.id===id),obj);}
  else{ATIVS.unshift({id:Date.now(),...obj});}
  AUDITLOG.unshift({time:new Date().toLocaleString('pt-BR').slice(0,14),user:'João S.',action:id?'atividade_editada':'atividade_criada',entity:'atividades',detail:titulo,ip:'177.x.x.1'});
  closeMod();nav('atividades');showF(id?'Atividade atualizada!':'Atividade criada!');
};

function pgValidacao(c){
  const pend=LEADS.filter(l=>l.val.status==='pending').length;
  const ap=LEADS.filter(l=>l.val.status==='approved').length;
  const rj=LEADS.filter(l=>l.val.status==='rejected').length;
  const tot=ap+rj||1;
  const scoresL=LEADS.filter(l=>l.val.score!==null);
  const avgS=scoresL.length?Math.round(scoresL.reduce((a,l)=>a+l.val.score,0)/scoresL.length):0;

  c.innerHTML=`
  <div class="kg" style="grid-template-columns:repeat(5,1fr);margin-bottom:10px">
    <div class="kc" style="border-left:3px solid var(--wa)"><div class="kl">Pendentes</div><div class="kv" style="color:var(--wa)">${pend}</div><div class="ks">aguardando decisão</div></div>
    <div class="kc" style="border-left:3px solid var(--ok)"><div class="kl">Aprovados</div><div class="kv" style="color:var(--ok)">${ap}</div><div class="ks">para expedição</div></div>
    <div class="kc" style="border-left:3px solid var(--er)"><div class="kl">Rejeitados</div><div class="kv" style="color:var(--er)">${rj}</div><div class="ks">cancelados</div></div>
    <div class="kc" style="border-left:3px solid var(--acc)"><div class="kl">Taxa aprovação</div><div class="kv" style="color:var(--acc)">${Math.round(ap/tot*100)}%</div><div class="ks">do total validado</div></div>
    <div class="kc" style="border-left:3px solid var(--pu)"><div class="kl">Score médio</div><div class="kv" style="color:var(--pu)">${avgS||'—'}</div><div class="ks">0–100 pontos</div></div>
  </div>
  <div class="tl" id="vtabs">
    <button class="tab on" data-tv="pending">Pendentes (${pend})</button>
    <button class="tab" data-tv="all">Todos (${LEADS.length})</button>
    <button class="tab" data-tv="approved">Aprovados (${ap})</button>
    <button class="tab" data-tv="rejected">Rejeitados (${rj})</button>
  </div>
  <div style="padding:7px 12px;border-bottom:1px solid var(--b1);background:var(--card)">
    <input type="text" class="fc" id="vsrch" placeholder="Buscar por nome, trans. key, telefone..." style="width:100%;font-size:10px">
  </div>
  <div class="card" style="border-top:none;border-radius:0 0 var(--r) var(--r)">
    <div class="scroll-x"><table>
      <thead><tr><th>#</th><th>Trans. key</th><th>Nome</th><th>Produto</th><th>Valor</th><th>Ligação</th><th>Pedido</th><th>Logística</th><th>Validação</th><th>Score</th><th>Risco</th><th>Op.</th><th>Dt. Prev.</th><th style="text-align:right">Ação</th></tr></thead>
      <tbody id="valtb">
      ${LEADS.map(l=>`<tr data-vs="${l.val.status}">
        <td class="tm" style="font-size:9px">${l.id}</td>
        <td class="tm" style="font-size:9px">${l.key}</td>
        <td style="font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.nome}</td>
        <td class="td" style="font-size:9px">${l.produto}</td>
        <td class="tm" style="font-size:10px">${money(l.valor)}</td>
        <td>${ligBadge(l.ligacao)}</td>
        <td>${pedidoBadge(l.pedido)}</td>
        <td>${logBadge(l.logOk)}</td>
        <td>${valBadge(l.val.status)}</td>
        <td style="font-family:var(--mono);font-size:10px;color:${l.val.score===null?'var(--t3)':scoreColor(l.val.score)}">${l.val.score!==null?l.val.score+'/100':'—'}</td>

        <td class="td" style="font-size:9px">${l.val.operador||l.operador||'—'}</td>

    </table></div>
  </div>`;

  document.querySelectorAll('#vtabs .tab').forEach(tab=>{

      document.querySelectorAll('#vtabs .tab').forEach(t=>t.classList.remove('on'));this.classList.add('on');
      const tv=this.dataset.tv;
      document.querySelectorAll('#valtb tr').forEach(tr=>tr.style.display=(tv==='all'||tr.dataset.vs===tv)?'':'none');
    });

    const q=this.value.toLowerCase();
    document.querySelectorAll('#valtb tr').forEach(tr=>tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none');

}

    :`<button class="btn btg bts" onclick="closeMod()">Cancelar</button>

    const names=['call-att','call-ans','wp','ord','addr','prod'];
    function recalc(){
      const fv={callAttempted:!!document.getElementById('vc-call-att')?.checked,callAnswered:!!document.getElementById('vc-call-ans')?.checked,wpConfirmed:!!document.getElementById('vc-wp')?.checked,orderConfirmed:!!document.getElementById('vc-ord')?.checked,addrConfirmed:!!document.getElementById('vc-addr')?.checked,prodConfirmed:!!document.getElementById('vc-prod')?.checked};
      const s=scoreCalc({...fv,whatsappConfirmed:fv.wpConfirmed,customerConfirmedOrder:fv.orderConfirmed,confirmedAddress:fv.addrConfirmed,confirmedProduct:fv.prodConfirmed});
      const r=riskCalc(s);const col=scoreColor(s);
      const sn=document.getElementById('sc-num');const sc2=document.getElementById('sc-circle');
      if(sn){sn.textContent=s;sn.style.color=col;if(sc2)sc2.style.borderColor=col;}
      const srk=document.getElementById('sc-risk');if(srk)srk.innerHTML=riskBadge(r);
      const si=document.getElementById('vc-score');if(si)si.value=s;
      const ri2=document.getElementById('vc-risk');if(ri2)ri2.value=r;
      names.forEach(n=>{const el=document.getElementById('vc-'+n);const pd=document.getElementById('prog-'+n);if(pd&&el){const chk=el.checked;pd.innerHTML=`<span style="font-size:10px;color:${chk?'var(--t1)':'var(--t3)'}">${chk?'✓':'○'} ${pd.querySelector('span').textContent.slice(2)}</span>`;}});
    }
    names.forEach(n=>{const el=document.getElementById('vc-'+n);if(el)el.addEventListener('change',recalc);});
    ['autoscbtn','autoscbtn2'].forEach(bid=>{const b=document.getElementById(bid);if(b)b.addEventListener('click',recalc);});
  }
};

window.saveVal=function(id,status){
  const l=LEADS.find(x=>x.id===id);if(!l)return;
  const callAtt=!!document.getElementById('vc-call-att')?.checked;
  const callAns=!!document.getElementById('vc-call-ans')?.checked;
  const wp=!!document.getElementById('vc-wp')?.checked;
  const ord=!!document.getElementById('vc-ord')?.checked;
  const addr=!!document.getElementById('vc-addr')?.checked;
  const prod=!!document.getElementById('vc-prod')?.checked;
  const sc=scoreCalc({callAttempted:callAtt,callAnswered:callAns,wpConfirmed:wp,orderConfirmed:ord,addrConfirmed:addr,prodConfirmed:prod});
  const ri=riskCalc(sc);
  const lig=document.getElementById('vc-ligacao')?.value||l.val.ligacao;
  const ped=document.getElementById('vc-pedido')?.value||l.val.pedido;
  l.val={...l.val,status,score:sc,risk:ri,callAttempted:callAtt,callAnswered:callAns,wpConfirmed:wp,orderConfirmed:ord,addrConfirmed:addr,prodConfirmed:prod,ligacao:lig,pedido:ped,attempts:parseInt(document.getElementById('vc-attempts')?.value)||0,reason:document.getElementById('vc-reason')?.value||'',notes:document.getElementById('vc-notes')?.value||''};
  l.ligacao=lig;l.pedido=ped;
  AUDITLOG.unshift({time:new Date().toLocaleString('pt-BR').slice(0,14),user:'João S.',action:'validation_'+status,entity:'leads',detail:`${l.key} — score ${sc}`,ip:'177.x.x.1'});
  closeMod();nav('validacao');
  const msgs={approved:`✓ ${l.nome.split(' ')[0]} aprovado — score ${sc}/100`,rejected:`${l.nome.split(' ')[0]} rejeitado`,pending:`Rascunho salvo — score ${sc}/100`};
  showF(msgs[status],status==='approved'?'ok':status==='rejected'?'er':'wa');
};

function pgFinanceiro(c){
  const ap=fd().filter(r=>r.status==='Pagamento Aprovado');

  const com=ap.reduce((a,r)=>a+r.comissao,0);
  c.innerHTML=`
  <div class="kg" style="grid-template-columns:repeat(4,1fr)">
    <div class="kc" style="border-left:3px solid var(--ok)"><div class="kl">Receita bruta</div><div class="kv" style="color:var(--ok);font-size:14px">${money(rec)}</div><div class="ks">${ap.length} pedidos</div></div>
    <div class="kc" style="border-left:3px solid var(--acc)"><div class="kl">Comissões</div><div class="kv" style="color:var(--acc);font-size:14px">${money(com)}</div></div>
    <div class="kc" style="border-left:3px solid var(--te)"><div class="kl">Líquido estimado</div><div class="kv" style="color:var(--te);font-size:14px">${money(rec-com)}</div></div>
    <div class="kc" style="border-left:3px solid var(--pu)"><div class="kl">Ticket médio</div><div class="kv" style="color:var(--pu);font-size:14px">${ap.length?money(Math.round(rec/ap.length)):'—'}</div></div>
  </div>
  <div class="p2">
    <div class="card"><div class="ch"><span class="ct2">Por forma de pagamento</span></div><div style="padding:0">
      ${Object.entries(ap.reduce((a,r)=>{const k=r.forma_pag.trim()||'Outros';a[k]=(a[k]||0)+r.valor;return a;},{})).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
      <div class="row-l" style="padding:5px 12px"><span style="color:var(--t2)">${k}</span><span style="font-family:var(--mono);color:var(--ok)">${money(v)}</span></div>`).join('')}
    </div></div>
    <div class="card"><div class="ch"><span class="ct2">Por estado (top 8)</span></div><div style="padding:0">
      ${Object.entries(ap.reduce((a,r)=>{if(r.estado)a[r.estado]=(a[r.estado]||0)+r.valor;return a;},{})).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([e,v])=>`
      <div class="row-l" style="padding:5px 12px"><span style="color:var(--t2)">${e}</span><span style="font-family:var(--mono);color:var(--ok)">${money(v)}</span></div>`).join('')}
    </div></div>
  </div>`;
}

function pgAfiliados(c){
  const bySrc=D.reduce((a,r)=>{const k=r.src||'direto';if(!a[k])a[k]={n:0,val:0,com:0,ap:0};a[k].n++;a[k].val+=r.valor;a[k].com+=r.comissao;if(r.status==='Pagamento Aprovado')a[k].ap++;return a;},{});
  c.innerHTML=`<div style="margin-bottom:10px;font-family:var(--mono);font-size:12px">Afiliados / Src</div>
  <div class="card"><table>
    <thead><tr><th>Src</th><th>Pedidos</th><th>Aprovados</th><th>Taxa</th><th>Receita</th><th>Comissão</th></tr></thead>
    <tbody>
    ${Object.entries(bySrc).sort((a,b)=>b[1].ap-a[1].ap).map(([src,v])=>`<tr>
      <td><span class="badge bac">${src}</span></td>
      <td class="tm">${v.n}</td><td style="color:var(--ok);font-family:var(--mono)">${v.ap}</td>
      <td style="font-family:var(--mono);color:${v.n&&Math.round(v.ap/v.n*100)>=60?'var(--ok)':'var(--wa)'}">${v.n?Math.round(v.ap/v.n*100):0}%</td>
      <td class="tm">${money(v.val)}</td><td class="tm">${money(v.com)}</td>
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function colabCard(u){
  const initials=u.nome.split(' ').map(w=>w[0]).slice(0,2).join('');
  const colors=[['var(--ad)','var(--acc)'],['rgba(155,89,182,.2)','var(--pu)'],['rgba(26,188,156,.2)','var(--te)'],['rgba(231,76,60,.15)','var(--er)'],['rgba(243,156,18,.15)','var(--wa)']];
  const[bg,fg]=colors[u.id%colors.length];
  return`<div class="card" style="padding:11px" id="colab-${u.id}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div class="avatar" style="background:${bg};color:${fg}">${initials}</div>
      <div style="min-width:0">
        <div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.nome}${u.admin?` <span class="badge bwa" style="font-size:7px">admin</span>`:''}</div>
        <div style="font-size:9px;color:var(--t3);font-family:var(--mono)">${u.email}</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--t2);margin-bottom:7px">${u.tel}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px">
      <span class="badge ${u.status==='active'?'bok':'bne'}">${u.status==='active'?'ativo':'inativo'}</span>
      ${!u.admin?`<div style="display:flex;gap:4px">
        <button class="btn btg bts" style="font-size:9px" onclick="editPerms(${u.id})">Permissões</button>
        <button class="btn btg bts" style="font-size:9px" onclick="toggleColab(${u.id})">${u.status==='active'?'Desativar':'Ativar'}</button>
      </div>`:''}
    </div>
  </div>`;
}

window.openNovoColab=function(){
  openMod('Adicionar colaborador',`
    <div class="fg"><label class="fl">Nome *</label><input class="fc" id="cn" placeholder="Nome completo"></div>
    <div class="fg"><label class="fl">E-mail *</label><input class="fc" id="ce" type="email" placeholder="email@dominio.com"></div>
    <div class="fg"><label class="fl">Telefone</label><input class="fc" id="ct" placeholder="(00) 00000-0000"></div>`,
  `<button class="btn btg bts" onclick="closeMod()">Cancelar</button>
   <button class="btn btp bts" onclick="addColab()">Criar</button>`);
};
window.addColab=function(){
  const n=document.getElementById('cn')?.value.trim();const e=document.getElementById('ce')?.value.trim();
  if(!n||!e){showF('Nome e e-mail obrigatórios','er');return;}
  COLABS.push({id:Date.now(),nome:n,email:e,tel:document.getElementById('ct')?.value.trim()||'—',status:'active',admin:false,perms:['dashboard_view']});
  AUDITLOG.unshift({time:new Date().toLocaleString('pt-BR').slice(0,14),user:'Admin',action:'colab_criado',entity:'colaboradores',detail:n,ip:'200.x.x.7'});
  closeMod();nav('colaboradores');showF(`${n} criado`);
};
window.toggleColab=function(id){
  const u=COLABS.find(x=>x.id===id);if(!u)return;
  u.status=u.status==='active'?'inactive':'active';
  nav('colaboradores');showF(`${u.nome} ${u.status==='active'?'ativado':'desativado'}`,'wa');
};
window.editPerms=function(id){
  const u=COLABS.find(x=>x.id===id);if(!u)return;
  openMod(`Permissões — ${u.nome}`,`
    <div style="font-size:10px;color:var(--t3);margin-bottom:8px">Selecione as permissões para ${u.nome}:</div>
    <div class="perm-grid">
      ${ALL_PERMS.map(p=>`<label class="perm-item">
        <input type="checkbox" id="perm-${p}" ${u.perms.includes('*')||u.perms.includes(p)?'checked':''} style="accent-color:var(--acc)">
        <span style="font-family:var(--mono)">${p}</span>
      </label>`).join('')}
    </div>`,
  `<button class="btn btg bts" onclick="closeMod()">Cancelar</button>
   <button class="btn btp bts" onclick="savePerms(${id})">Salvar permissões</button>`);
};
window.savePerms=function(id){
  const u=COLABS.find(x=>x.id===id);if(!u)return;
  u.perms=ALL_PERMS.filter(p=>document.getElementById(`perm-${p}`)?.checked);
  AUDITLOG.unshift({time:new Date().toLocaleString('pt-BR').slice(0,14),user:'Admin',action:'perms_atualizadas',entity:'colaboradores',detail:u.nome,ip:'200.x.x.7'});
  closeMod();nav('colaboradores');showF(`Permissões de ${u.nome} salvas`);
};

};
