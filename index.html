// Estado reactivo
const D = RAW.map(r=>({...r}));

// Preencher filtros
function initFilters(){
  const estados=[...new Set(D.map(r=>r.estado).filter(Boolean))].sort();
  const srcs=[...new Set(D.map(r=>r.src).filter(Boolean))].sort();
  const se=document.getElementById('sf-estado');
  const ss=document.getElementById('sf-src');
  estados.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;se.appendChild(o);});
  srcs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;ss.appendChild(o);});
}

function filteredData(){
  const st=document.getElementById('sf-status').value;
  const es=document.getElementById('sf-estado').value;
  const sr=document.getElementById('sf-src').value;
  return D.filter(r=>((!st||r.status===st)&&(!es||r.estado===es)&&(!sr||r.src===sr)));
}

function money(c){return'R$ '+(c/100).toLocaleString('pt-BR',{minimumFractionDigits:2});}
function stBadge(s){const m={'Pagamento Aprovado':'bok','Devolvido':'ber','Cancelada':'bne','Cancelado':'bne','Agendado':'bwa','Aguardando Pagamento':'bwa','Frustrada':'ber','Pagamento Atrasado':'bpu'};return`<span class="badge ${m[s]||'bne'}">${s||'—'}</span>`;}
function recBadge(s){const m={'Entregue':'bok','Aguardando Retirada':'bwa','Frustrada':'ber','A Enviar':'bac','A Caminho':'bte','Postado':'bpu'};return`<span class="badge ${m[s]||'bne'}">${s||'—'}</span>`;}
function altBadge(s){if(s==='PAGO')return`<span class="badge bok">PAGO</span>`;if(s==='ESPERA')return`<span class="badge bwa">ESPERA</span>`;return`<span class="badge bne">${s||'—'}</span>`;}
function pagBadge(p){const cls=p.includes('0025')?'bte':p.includes('0026')?'bac':p.includes('0027')?'bpu':'bne';return`<span class="badge ${cls}">${p}</span>`;}

let curP='dash',flashT=null;
function showF(msg,t='ok'){
  const c=document.getElementById('content');const o=c.querySelector('.fl2');if(o)o.remove();
  const d=document.createElement('div');d.className=`fl2 ${t}`;
  d.innerHTML=`<span>${t==='ok'?'✓':t==='er'?'✕':'⚠'}</span> ${msg}`;
  c.insertBefore(d,c.firstChild);if(flashT)clearTimeout(flashT);flashT=setTimeout(()=>d.remove(),5000);
}
function openMod(title,body,foot){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mfoot').innerHTML=foot||`<button class="btn btg bts" onclick="closeMod()">Fechar</button>`;
  document.getElementById('mbg').classList.add('open');
}
function closeMod(){document.getElementById('mbg').classList.remove('open');}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))closeMod();});

function nav(p){
  curP=p;
  document.querySelectorAll('.ni').forEach(i=>i.classList.toggle('on',i.dataset.p===p));
  const T={dash:'Dashboard',pedidos:'Pedidos',rastreio:'Rastreio',cobranca:'Cobrança Afterpay',entregues:'Entregues',devolvidos:'Devolvidos',cancelados:'Cancelados',financeiro:'Financeiro',afiliados:'Afiliados',importar:'Importar Planilha',planilha:'Dados Importados'};
  document.getElementById('ptitle').textContent=T[p]||p;
  updateBadge();
  const P={dash:pgDash,pedidos:pgPedidos,rastreio:pgRastreio,cobranca:pgCobranca,entregues:pgEntregues,devolvidos:pgDevolvidos,cancelados:pgCancelados,financeiro:pgFinanceiro,afiliados:pgAfiliados,importar:pgImportar,planilha:pgPlanilha};
  const c=document.getElementById('content');c.innerHTML='';
  if(P[p])P[p](c);
}
function updateBadge(){
  const n=D.filter(r=>r.afterpay&&(r.st_rec==='Aguardando Retirada'||r.st_rec==='Entregue')&&r.alterado!=='PAGO_CONFIRMADO').length;
  const b=document.getElementById('cob-badge');if(b){b.textContent=n;b.style.display=n>0?'':'none';}
}

function pgDash(c){
  const fd=filteredData();

    <div class="kc" style="border-left:3px solid var(--pu)"><div class="kl">Afterpay</div><div class="kv" style="color:var(--pu)">${afterpay}</div><div class="ks">${tot?Math.round(afterpay/tot*100):0}% do total</div></div>

        ${[['Pagamento Aprovado',ap,tot,'ok'],['Devolvido',dv,tot,'er'],['Cancelada',ca,tot,'t2'],['Agendado',ag,tot,'wa']].map(([l,v,t,col])=>{const p=t?Math.round(v/t*100):0;return`
        <div class="row-l" style="padding:6px 12px">

    </div>
    <div class="card">
      <div class="ch"><span class="ct2">Status de entrega</span><button class="btn btg bts" onclick="nav('cobranca')">Cobrança →</button></div>
      <div style="padding:0">
        ${[['Entregue',entregues,'ok'],['Aguardando Retirada',agRet,'wa'],['Frustrada',frustr,'er'],['A Caminho',fd.filter(r=>r.st_rec==='A Caminho').length,'te'],['A Enviar',fd.filter(r=>r.st_rec==='A Enviar').length,'acc'],['Postado',fd.filter(r=>r.st_rec==='Postado').length,'pu']].map(([l,v,col])=>`

// ── COBRANÇA — módulo principal ───────────────────────────────
function pgCobranca(c){
  const fd=filteredData().filter(r=>r.afterpay);
  const agRet=fd.filter(r=>r.st_rec==='Aguardando Retirada');
  const entregue=fd.filter(r=>r.st_rec==='Entregue'&&r.alterado!=='PAGO_CONFIRMADO');
  const frustr=fd.filter(r=>r.st_rec==='Frustrada');
  const caminho=fd.filter(r=>r.st_rec==='A Caminho'||r.st_rec==='Postado');

  c.innerHTML=`
  <div class="kg" style="grid-template-columns:repeat(4,1fr);margin-bottom:10px">
    <div class="kc" style="border-left:3px solid var(--wa)"><div class="kl">Ag. Retirada</div><div class="kv" style="color:var(--wa)">${agRet.length}</div><div class="ks">acionar agora</div></div>
    <div class="kc" style="border-left:3px solid var(--ok)"><div class="kl">Entregues</div><div class="kv" style="color:var(--ok)">${entregue.length}</div><div class="ks">aguardam confirmação</div></div>
    <div class="kc" style="border-left:3px solid var(--er)"><div class="kl">Frustradas</div><div class="kv" style="color:var(--er)">${frustr.length}</div><div class="ks">sem pagamento</div></div>
    <div class="kc" style="border-left:3px solid var(--te)"><div class="kl">Em trânsito</div><div class="kv" style="color:var(--te)">${caminho.length}</div><div class="ks">a caminho/postado</div></div>
  </div>

  <div class="tl" id="cob-tabs">
    <button class="tab on" data-cob="agret">Ag. Retirada (${agRet.length})</button>
    <button class="tab" data-cob="entregue">Entregues (${entregue.length})</button>
    <button class="tab" data-cob="frustrada">Frustradas (${frustr.length})</button>
    <button class="tab" data-cob="caminho">Em trânsito (${caminho.length})</button>
    <button class="tab" data-cob="todos">Todos afterpay (${fd.length})</button>
  </div>

  <div style="padding:8px 12px;border-bottom:1px solid var(--b1);background:var(--card);display:flex;align-items:center;gap:8px">
    <input type="text" class="fc" id="cobsrch" placeholder="Buscar nome, key, rastreio, telefone..." style="flex:1;font-size:10px">
    <select class="sl" id="cobuf"><option value="">Todos UF</option>${[...new Set(fd.map(r=>r.estado))].sort().map(e=>`<option>${e}</option>`).join('')}</select>
  </div>

  <div class="card" style="margin-top:0;border-top:none;border-radius:0 0 var(--r) var(--r)">
    <div class="scroll-x"><table>
      <thead><tr>
        <th>Key</th><th>Nome</th><th>Tel.</th><th>Produto</th><th>Valor</th>
        <th>Rastreio</th><th>Status</th><th>St.Recebido</th><th>Alterado</th>
        <th>Pagos</th><th>UF/Cidade</th>
        <th title="Dia 0 - Tent.2">N0·2</th><th title="Dia 0 - Tent.4">N0·4</th><th title="Dia 0 - Tent.5">N0·5</th>
        <th title="Dia 7 - Tent.1">N7·1</th><th title="Dia 7 - Tent.2">N7·2</th><th title="Dia 7 - Tent.4">N7·4</th>
        <th title="Dia 9 - Tent.1">N9·1</th><th title="Dia 9 - Tent.2">N9·2</th><th>RR</th>
        <th>Ação</th>
      </tr></thead>
      <tbody id="cob-tb">
      ${fd.map(r=>cobRow(r)).join('')}
      </tbody>
    </table></div>
  </div>`;

  // Tab switching
  document.querySelectorAll('#cob-tabs .tab').forEach(tab=>{
    tab.addEventListener('click',function(){
      document.querySelectorAll('#cob-tabs .tab').forEach(t=>t.classList.remove('on'));
      this.classList.add('on');
      const tv=this.dataset.cob;
      const groups={agret:agRet,entregue,frustrada:frustr,caminho,todos:fd};
      const ids=new Set((groups[tv]||fd).map(r=>r.id));
      document.querySelectorAll('#cob-tb tr').forEach(tr=>{
        tr.style.display=ids.has(parseInt(tr.dataset.id))?'':'none';
      });
    });
  });

  // Search + UF filter
  function filterCob(){
    const q=document.getElementById('cobsrch').value.toLowerCase();
    const uf=document.getElementById('cobuf').value;
    document.querySelectorAll('#cob-tb tr').forEach(tr=>{
      const matchQ=!q||tr.textContent.toLowerCase().includes(q);
      const matchUF=!uf||tr.dataset.estado===uf;
      tr.style.display=(matchQ&&matchUF)?'':'none';
    });
  }
  document.getElementById('cobsrch').addEventListener('input',filterCob);
  document.getElementById('cobuf').addEventListener('change',filterCob);
}

function cobRow(r){
  function ncell(val,key,rid){
    const filled=val&&val.trim();
    return`<td style="min-width:70px;padding:3px 4px">
      <input type="text" value="${val||''}" placeholder="—" data-key="${key}" data-rid="${rid}"
        style="width:68px;background:${filled?'rgba(46,204,113,.08)':'var(--inp)'};border:1px solid ${filled?'rgba(46,204,113,.3)':'var(--b1)'};color:${filled?'var(--ok)':'var(--t3)'};border-radius:3px;padding:2px 4px;font-size:9px;font-family:var(--mono);outline:none"
        onchange="updateN(${rid},'${key}',this.value)"
        onclick="event.stopPropagation()">
    </td>`;
  }
  return`<tr data-id="${r.id}" data-estado="${r.estado||''}" style="cursor:pointer" onclick="openCobranca(${r.id})">
    <td class="tm" style="font-size:9px">${r.key}</td>
    <td style="font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.nome}</td>
    <td class="tm" style="font-size:9px">${r.tel}</td>
    <td class="td" style="font-size:9px;white-space:nowrap">${r.plano}</td>
    <td class="tm" style="font-size:10px">${money(r.valor)}</td>
    <td class="tm" style="font-size:9px">${r.rastreio||'—'}</td>
    <td>${stBadge(r.status)}</td>
    <td>${recBadge(r.st_rec)}</td>
    <td>${altBadge(r.alterado)}</td>
    <td>${pagBadge(r.pagos||'—')}</td>
    <td class="td" style="font-size:9px">${r.estado}<br>${r.cidade||''}</td>
    ${ncell(r.N0_2,'N0_2',r.id)}${ncell(r.N0_4,'N0_4',r.id)}${ncell(r.N0_5,'N0_5',r.id)}
    ${ncell(r.N7_1,'N7_1',r.id)}${ncell(r.N7_2,'N7_2',r.id)}${ncell(r.N7_4,'N7_4',r.id)}
    ${ncell(r.N9_1,'N9_1',r.id)}${ncell(r.N9_2,'N9_2',r.id)}
    <td style="min-width:70px;padding:3px 4px">${ncell(r.RR,'RR',r.id).replace('<td','<span').replace('</td>','</span>')}</td>
    <td onclick="event.stopPropagation()">
      <button class="btn btp bts" style="font-size:9px" onclick="openCobranca(${r.id})">Detalhe</button>
    </td>
  </tr>`;
}

window.updateN=function(id,key,val){
  const r=D.find(x=>x.id===id);if(!r)return;
  r[key]=val;
  const el=document.querySelector(`input[data-rid="${id}"][data-key="${key}"]`);
  if(el){
    const filled=val&&val.trim();
    el.style.background=filled?'rgba(46,204,113,.08)':'var(--inp)';
    el.style.borderColor=filled?'rgba(46,204,113,.3)':'var(--b1)';
    el.style.color=filled?'var(--ok)':'var(--t3)';
  }
};

      <div style="font-size:9px;color:var(--t3);margin-bottom:8px">Nomenclatura: <b style="color:var(--t2)">N[Dia]-[Tentativa]</b> · Ex: N0-2 = Dia 0, 2ª tentativa</div>

      <div class="cob-grid" style="grid-template-columns:1fr 1fr 1fr">

          ['N0 — Dia 0 (entrega)',['N0_2','N0_4','N0_5','N0_7','N0_8']],

        ].map(([titulo,campos])=>`

          <div class="cob-dia-head"><span class="cob-dia-title">${titulo}</span></div>
          ${campos.map(key=>{
            const label=key.replace('_','·').replace('N0·','').replace('N7·','').replace('N9·','');

            const tentLabel={'2':'2ª tent.','4':'4ª tent.','5':'5ª tent.','7':'7ª tent.','8':'8ª tent.','1':'1ª tent.'}[tentNum]||tentNum;
            return`<div class="cob-tent">
              <span style="font-size:8px;color:var(--t3);min-width:42px">${tentLabel}</span>
              <input type="text" class="fc" id="mn-${key}-${r.id}" value="${r[key]||''}" placeholder="—"

        <div class="cob-dia-head"><span class="cob-dia-title" style="color:var(--er)">RR — Recuperação final</span></div>

      </div>

  openMod(`Cobrança — ${r.nome.split(' ')[0]} · ${r.key}`,body,`<button class="btn btg bts" onclick="closeMod()">Fechar</button><button class="btn btp bts" onclick="saveCobranca(${r.id})">Salvar alterações</button>`);

window.saveCobranca=function(id){
  const r=D.find(x=>x.id===id);if(!r)return;
  ['N0_2','N0_4','N0_5','N0_7','N0_8','N7_1','N7_2','N7_4','N7_5','N7_7','N7_8','N9_1','N9_2','RR'].forEach(k=>{
    const el=document.getElementById(`mn-${k}-${id}`);
    if(el)r[k]=el.value;
  });
  closeMod();showF(`Cobrança de ${r.nome.split(' ')[0]} salva com sucesso`);nav('cobranca');
};
window.markPago=function(id){const r=D.find(x=>x.id===id);if(!r)return;r.alterado='PAGO';r.RR='PAGO';closeMod();nav('cobranca');showF(`Pago confirmado — ${r.nome.split(' ')[0]}`,'ok');};

function pgFinanceiro(c){
  const fd=filteredData();
  const ap=fd.filter(r=>r.status==='Pagamento Aprovado');
  const rec=ap.reduce((a,r)=>a+r.valor,0);
  const com=ap.reduce((a,r)=>a+r.comissao,0);
  const liq=rec-com;
  const byForma=ap.reduce((a,r)=>{const k=r.forma_pag.trim()||'Outros';a[k]=(a[k]||0)+r.valor;return a;},{});
  c.innerHTML=`
  <div class="kg" style="grid-template-columns:repeat(4,1fr)">
    <div class="kc" style="border-left:3px solid var(--ok)"><div class="kl">Receita bruta</div><div class="kv" style="color:var(--ok);font-size:14px">${money(rec)}</div><div class="ks">${ap.length} pedidos</div></div>
    <div class="kc" style="border-left:3px solid var(--acc)"><div class="kl">Comissões</div><div class="kv" style="color:var(--acc);font-size:14px">${money(com)}</div><div class="ks">afiliados + produtor</div></div>
    <div class="kc" style="border-left:3px solid var(--te)"><div class="kl">Líquido estimado</div><div class="kv" style="color:var(--te);font-size:14px">${money(liq)}</div><div class="ks">bruto - comissões</div></div>
    <div class="kc" style="border-left:3px solid var(--pu)"><div class="kl">Ticket médio</div><div class="kv" style="color:var(--pu);font-size:14px">${ap.length?money(Math.round(rec/ap.length)):'—'}</div><div class="ks">por pedido aprovado</div></div>
  </div>
  <div class="p2">
    <div class="card">
      <div class="ch"><span class="ct2">Receita por forma de pagamento</span></div>
      <div style="padding:0">
        ${Object.entries(byForma).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
        <div class="row-l" style="padding:6px 12px">
          <span style="color:var(--t2);font-size:11px">${k}</span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--ok)">${money(v)}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct2">Receita por estado (top 8)</span></div>
      <div style="padding:0">
        ${Object.entries(ap.reduce((a,r)=>{if(r.estado)a[r.estado]=(a[r.estado]||0)+r.valor;return a;},{})).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([e,v])=>`
        <div class="row-l" style="padding:5px 12px">
          <span style="color:var(--t2);font-size:11px">${e}</span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--ok)">${money(v)}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function pgAfiliados(c){
  const fd=filteredData().filter(r=>r.email_afil||r.src);
  const bySrc=fd.reduce((a,r)=>{const k=r.src||'direto';if(!a[k])a[k]={n:0,val:0,com:0,ap:0};a[k].n++;a[k].val+=r.valor;a[k].com+=r.comissao;if(r.status==='Pagamento Aprovado')a[k].ap++;return a;},{});
  c.innerHTML=`
  <div style="margin-bottom:10px;font-family:var(--mono);font-size:12px">Desempenho por afiliado/src</div>
  <div class="card"><table>
    <thead><tr><th>Src / Afiliado</th><th>Pedidos</th><th>Aprovados</th><th>Taxa aprov.</th><th>Receita total</th><th>Comissão total</th></tr></thead>
    <tbody>
    ${Object.entries(bySrc).sort((a,b)=>b[1].ap-a[1].ap).map(([src,v])=>`<tr>
      <td><span class="badge bac" style="font-size:9px">${src}</span></td>
      <td class="tm">${v.n}</td>
      <td style="color:var(--ok);font-family:var(--mono)">${v.ap}</td>
      <td style="font-family:var(--mono);color:${v.n?Math.round(v.ap/v.n*100):0>=60?'var(--ok)':'var(--wa)'}">${v.n?Math.round(v.ap/v.n*100):0}%</td>
      <td class="tm">${money(v.val)}</td>
      <td class="tm">${money(v.com)}</td>
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}

// ── IMPORTAR PLANILHA ─────────────────────────────────────────
function pgImportar(c){
  c.innerHTML=`
  <div style="max-width:700px;margin:0 auto">
    <div class="card" style="margin-bottom:12px">
      <div class="ch"><span class="ct2">⊞ Importar nova planilha (.xlsx / .csv)</span></div>
      <div class="cb">
        <div class="upload-zone" id="uz">
          <input type="file" accept=".xlsx,.csv,.xls" onchange="handleFile(this)">
          <div style="font-size:24px;margin-bottom:8px;opacity:.3">⊞</div>
          <div style="font-size:13px;color:var(--t1);margin-bottom:4px">Arraste o arquivo aqui ou clique para selecionar</div>
          <div style="font-size:11px;color:var(--t3)">Suporta: .xlsx · .csv · .xls</div>
        </div>
        <div id="import-preview" style="margin-top:10px"></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="ch"><span class="ct2">Mapeamento de colunas obrigatórias</span><span class="badge bok">Planilha 004 — mapeada</span></div>
      <div class="cb">
        <div style="font-size:10px;color:var(--t3);margin-bottom:8px">Sua planilha deve conter as colunas abaixo para ser reconhecida automaticamente pelo sistema.</div>
        <div class="col-map">
          ${[['Codigo transação','trans_key','ok'],['Nome comprador','nome','ok'],['Telefone','tel','ok'],['status','status Braip','ok'],['status recebido','entrega','ok'],['Afterpay','afterpay flag','ok'],['Cod. Rastreio','rastreio','ok'],['valor','valor (R$)','ok'],['comissão','comissão afiliado','ok'],['forma de pagamento','forma pag.','ok'],['Plano','plano/produto','ok'],['Frascos','qtd frascos','ok'],['Estado','UF','ok'],['Cidade','cidade','ok'],['Endereço','endereço','ok'],['Documento','CPF/CNPJ','ok'],['PAGOS','lote pagamento','ok'],['Alterado','status financeiro','ok'],['N0-2','cobrança D0 T2','ok'],['N0-4','cobrança D0 T4','ok'],['N0-5','cobrança D0 T5','ok'],['N7-1','cobrança D7 T1','ok'],['N7-2','cobrança D7 T2','ok'],['N9-1','cobrança D9 T1','ok'],['N9-2','cobrança D9 T2','ok'],['RR','resultado final','ok'],['src','afiliado src','ok'],['E-mail Afiliado','e-mail afil.','ok'],['Valor-Afiliado','comissão afil.','ok']].map(([col,desc,status])=>`
          <div class="col-item">
            <div class="col-dot" style="background:${status==='ok'?'var(--ok)':'var(--wa)'}"></div>
            <div>
              <div style="font-family:var(--mono);color:var(--t1)">${col}</div>
              <div style="color:var(--t3)">${desc}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ch"><span class="ct2">Planilha atual carregada</span><span class="badge bok">${D.length} registros</span></div>
      <div class="cb">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px">
          ${[['Total registros',D.length,'acc'],['Aprovados',D.filter(r=>r.status==='Pagamento Aprovado').length,'ok'],['Devolvidos',D.filter(r=>r.status==='Devolvido').length,'er'],['Cancelados',D.filter(r=>r.status==='Cancelada').length,'t2'],['Afterpay',D.filter(r=>r.afterpay).length,'pu'],['Com rastreio',D.filter(r=>r.rastreio).length,'te']].map(([l,v,col])=>`
          <div style="background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:8px;text-align:center">
            <div style="font-size:9px;color:var(--t3);margin-bottom:3px">${l}</div>
            <div style="font-family:var(--mono);font-size:18px;color:var(--${col})">${v}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;

  // Drag & drop visual
  const uz=document.getElementById('uz');
  ['dragover','dragleave','drop'].forEach(ev=>uz.addEventListener(ev,e=>{
    e.preventDefault();
    uz.classList.toggle('drag',ev==='dragover');
    if(ev==='drop'&&e.dataTransfer.files[0])handleFileObj(e.dataTransfer.files[0]);
  }));
}

window.handleFile=function(input){if(input.files[0])handleFileObj(input.files[0]);};
window.handleFileObj=function(file){
  const prev=document.getElementById('import-preview');
  if(!prev)return;
  prev.innerHTML=`<div class="fl2 wa"><span>⚠</span> Arquivo <b>${file.name}</b> (${(file.size/1024).toFixed(0)} KB) recebido. Em um sistema real, este arquivo seria processado e os dados importados automaticamente com base no mapeamento de colunas acima.</div>`;
};

      <td>${pagBadge(r.pagos||'—')}</td>
      <td>${altBadge(r.alterado)}</td>
      <td class="tm" style="font-size:8px">${r.rastreio||'—'}</td>

window.openPedido=function(id){
  const r=D.find(x=>x.id===id);if(!r)return;
  openMod(`Pedido — ${r.nome}`,`
    <div class="p2">
      <div>
        ${[['Trans. key',r.key],['Data/Hora',r.data+' '+r.hora],['Pago em',r.pago_em],['Nome',r.nome],['Telefone',r.tel],['CPF/Doc',r.doc],['Produto',r.plano],['Frascos',r.frascos+'fx'],['Valor',money(r.valor)],['Comissão',money(r.comissao)],['Forma pag.',r.forma_pag],['Parcelas',r.parcelas+'x'],['Afterpay',r.afterpay?'SIM':'NÃO'],['Src',r.src||'—']].map(([k,v])=>`
        <div class="info-r"><span class="ik">${k}</span><span class="iv" style="font-family:var(--sans)">${v||'—'}</span></div>`).join('')}
      </div>
      <div>
        ${[['Rastreio',r.rastreio||'—'],['Status Braip',r.status],['St. Recebido',r.st_rec||'—'],['PAGOS (lote)',r.pagos],['Alterado',r.alterado],['Endereço',r.endereco],['Cidade/UF',r.cidade+' - '+r.estado]].map(([k,v])=>`
        <div class="info-r"><span class="ik">${k}</span><span class="iv" style="font-family:var(--sans)">${v||'—'}</span></div>`).join('')}
        <div style="margin-top:10px;font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase">Cobrança afterpay</div>
        ${['N0_2','N0_4','N0_5','N7_1','N7_2','N9_1','N9_2','RR'].map(k=>`
        <div class="info-r"><span class="ik" style="font-family:var(--mono)">${k.replace('_','·')}</span><span class="iv">${r[k]||'—'}</span></div>`).join('')}
        <div style="margin-top:8px;display:flex;gap:6px">
          ${r.afterpay?`<button class="btn btp bts" onclick="closeMod();openCobranca(${r.id})">Abrir cobrança →</button>`:''}
        </div>
      </div>
    </div>
  `,`<button class="btn btg bts" onclick="closeMod()">Fechar</button>`);
};
