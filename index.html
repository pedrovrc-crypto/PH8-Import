<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PH8 DASH v3 - Cloud & Import</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<style>
/* CSS ORIGINAL INTEGRAL MANTIDO */
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0d0f12;--card:#13161b;--hov:#1a1e25;--inp:#080a0d;--b1:#22272e;--b2:#2d3440;--t1:#e8eaf0;--t2:#8b909c;--t3:#555c68;--acc:#4f8ef7;--ad:#1a3260;--ok:#2ecc71;--wa:#f39c12;--er:#e74c3c;--pu:#9b59b6;--te:#1abc9c;--pi:#e91e8c;--r:5px;--mono:'DM Mono',monospace;--sans:'Inter',sans-serif}body{font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:13px}.app{display:flex;height:740px;border-radius:8px;overflow:hidden;border:1px solid var(--b1);position:relative}.sb{width:186px;background:var(--card);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}.brand{padding:11px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:7px}.bm{font-family:var(--mono);font-size:11px;color:var(--acc);background:var(--ad);border:1px solid var(--acc);border-radius:3px;padding:2px 6px}.bt{font-family:var(--mono);font-size:10px;color:var(--t2)}.ns{padding:3px 0;border-bottom:1px solid var(--b1)}.nl{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;padding:5px 11px 1px;font-weight:500}.ni{display:flex;align-items:center;gap:6px;padding:5px 11px;color:var(--t2);font-size:12px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .1s}.ni:hover{background:var(--hov);color:var(--t1)}.ni.on{background:var(--ad);color:var(--acc);border-right:2px solid var(--acc)}.nb{margin-left:auto;font-family:var(--mono);font-size:8px;border-radius:8px;padding:1px 5px;font-weight:600;background:var(--wa);color:#000}.nb.er{background:var(--er);color:#fff}.nb.acc{background:var(--acc);color:#fff}.sf{margin-top:auto;padding:8px 11px;border-top:1px solid var(--b1);font-size:11px;color:var(--t2)}.mn{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}.tb{height:43px;background:var(--card);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 13px;gap:8px;flex-shrink:0}.tt{font-family:var(--mono);font-size:12px;color:var(--t1);flex:1}.sl{background:var(--inp);border:1px solid var(--b2);color:var(--t1);border-radius:var(--r);padding:3px 7px;font-size:10px;font-family:var(--mono);cursor:pointer;outline:none}.ct{flex:1;padding:12px;overflow-y:auto}.kg{display:grid;gap:7px;margin-bottom:10px}.kc{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px}.kl{font-size:8px;font-weight:600;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:3px}.kv{font-family:var(--mono);font-size:19px;font-weight:500;line-height:1}.ks{font-size:9px;color:var(--t3);margin-top:2px}.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}.ch{padding:7px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:8px}.ct2{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;font-weight:500}.cb{padding:10px}.p2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.p3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}table{width:100%;border-collapse:collapse;font-size:11px}thead th{background:var(--bg);color:var(--t3);font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:5px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}tbody tr{border-bottom:1px solid var(--b1);transition:background .08s}tbody tr:hover{background:var(--hov)}tbody td{padding:5px 8px;color:var(--t1);vertical-align:middle}.tm{font-family:var(--mono);font-size:10px;color:var(--t2)}.td{color:var(--t3);font-size:10px}.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:8px;font-weight:600;padding:1px 5px;border-radius:2px;text-transform:uppercase;white-space:nowrap}.bok{background:rgba(46,204,113,.13);color:#2ecc71;border:1px solid rgba(46,204,113,.28)}.ber{background:rgba(231,76,60,.13);color:#e74c3c;border:1px solid rgba(231,76,60,.28)}.bwa{background:rgba(243,156,18,.13);color:#f39c12;border:1px solid rgba(243,156,18,.28)}.bac{background:rgba(79,142,247,.13);color:#4f8ef7;border:1px solid rgba(79,142,247,.28)}.bpu{background:rgba(155,89,182,.13);color:#9b59b6;border:1px solid rgba(155,89,182,.28)}.bte{background:rgba(26,188,156,.13);color:#1abc9c;border:1px solid rgba(26,188,156,.28)}.bne{background:rgba(139,144,156,.08);color:var(--t2);border:1px solid var(--b1)}.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r);font-size:10px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:var(--sans)}.btp{background:var(--acc);color:#fff;border-color:var(--acc)}.btp:hover{background:#3d7de8}.btg{background:transparent;color:var(--t2);border-color:var(--b2)}.btg:hover{background:var(--hov);color:var(--t1)}.bto{background:var(--ok);color:#000;border-color:var(--ok)}.btw{background:transparent;color:var(--wa);border-color:var(--wa)}.btr{background:transparent;color:var(--er);border-color:var(--er)}.bts{padding:3px 8px;font-size:10px}.fc{width:100%;background:var(--inp);border:1px solid var(--b2);color:var(--t1);border-radius:var(--r);padding:4px 8px;font-size:11px;font-family:var(--sans);outline:none;transition:border-color .12s}.fc:focus{border-color:var(--acc)}.fc::placeholder{color:var(--t3)}.fc:disabled{opacity:.45}.fg{margin-bottom:8px}.fl{display:block;font-size:8px;font-weight:600;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}.mbg{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none;align-items:center;justify-content:center}.mbg.open{display:flex}.modal{background:var(--card);border:1px solid var(--b2);border-radius:7px;width:96%;max-width:960px;max-height:95%;overflow-y:auto}.mh{padding:11px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:2}.mt{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--t1)}.mc{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;line-height:1}.mb{padding:14px}.mf{padding:9px 14px;border-top:1px solid var(--b1);display:flex;gap:6px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}.fl2{padding:6px 9px;border-radius:var(--r);font-size:10px;margin-bottom:8px;border:1px solid transparent;display:flex;align-items:center;gap:5px}.fl2.ok{background:rgba(46,204,113,.09);color:var(--ok);border-color:rgba(46,204,113,.25)}.fl2.er{background:rgba(231,76,60,.09);color:var(--er);border-color:rgba(231,76,60,.25)}.fl2.wa{background:rgba(243,156,18,.09);color:var(--wa);border-color:rgba(243,156,18,.25)}.pr{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:3px}.pf{height:100%;border-radius:2px}.row-l{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--b1);font-size:11px}.row-l:last-child{border-bottom:none}.tl{display:flex;border-bottom:1px solid var(--b1);padding:0 12px;overflow-x:auto}.tab{padding:7px 10px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--t2);background:none;border-top:none;border-left:none;border-right:none;transition:all .1s;white-space:nowrap}.tab:hover{color:var(--t1)}.tab.on{color:var(--acc);border-bottom-color:var(--acc)}.chkr{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1);cursor:pointer}.chkr:last-child{border-bottom:none}.chkr input{width:14px;height:14px;margin-top:2px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}.sco{width:72px;height:72px;border-radius:50%;border:3px solid var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;transition:border-color .3s}.info-r{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b1);font-size:10px}.info-r:last-child{border-bottom:none}.ik{color:var(--t2)}.iv{color:var(--t1);font-family:var(--mono);text-align:right;font-size:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.sec{font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin:8px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--b1);font-weight:600}
.ativ-card{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:9px 11px;margin-bottom:7px;display:flex;gap:9px;align-items:flex-start}.scroll-x{overflow-x:auto}select.fc option{background:var(--card)}
</style>

<div class="app" id="app">
    <aside class="sb">
      <div class="brand"><span class="bm">PH8</span><span class="bt">DASH v3</span></div>
      <div class="ns"><div class="nl">Geral</div><button class="ni on" data-p="dash">⬡ Dashboard</button><button class="ni" data-p="atividades">◈ Atividades <span class="nb acc" id="atv-badge">0</span></button></div>
      <div class="ns"><div class="nl">Funil</div><button class="ni" data-p="leads">◎ Leads</button><button class="ni" data-p="pedidos">◈ Pedidos</button><button class="ni" data-p="validacao">◇ Validação <span class="nb" id="val-badge">0</span></button></div>
      <div class="ns"><div class="nl">Operação</div><button class="ni" data-p="cobranca">◬ Cobrança <span class="nb er" id="cob-badge">0</span></button><button class="ni" data-p="entregues">✓ Entregues</button><button class="ni" data-p="rastreio">⬟ Rastreio</button></div>
      <div class="ns"><div class="nl">Sistema</div><button class="ni" data-p="colaboradores">▤ Colaboradores</button><button class="ni" data-p="importar">⊞ Importar Planilha</button></div>
      <div class="sf"><div style="font-size:10px;color:var(--t1);margin-bottom:1px" id="user-display">João Silva</div><div style="font-size:9px;color:var(--t3)">operador · ph8dash</div></div>
    </aside>

    <div class="mn">
      <div class="tb">
        <span class="tt" id="ptitle">Dashboard</span>
        <select class="sl" id="sf-status"><option value="">Todos status</option><option value="Pagamento Aprovado">Aprovados</option><option value="Cancelada">Cancelados</option></select>
        <select class="sl" id="sf-estado"><option value="">Todos UF</option></select>
        <button class="btn btg bts" onclick="nav(curP)">↻</button>
      </div>
      <div id="content" class="ct"></div>
    </div>

    <div class="mbg" id="mbg"><div class="modal"><div class="mh"><span class="mt" id="mtitle">—</span><button class="mc" onclick="closeMod()">×</button></div><div class="mb" id="mbody"></div><div class="mf" id="mfoot"></div></div></div>
</div>

<script type="module">
  // 1. FIREBASE SETUP
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDocs, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCrRZ028gtl-RoHNvebg6shdeThaguENV0",
    authDomain: "pedro-projetos-66e72.firebaseapp.com",
    projectId: "pedro-projetos-66e72",
    storageBucket: "pedro-projetos-66e72.firebasestorage.app",
    messagingSenderId: "137498455483",
    appId: "1:137498455483:web:94a57e61e52535612e689e",
    measurementId: "G-3YX4M7FJPT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 2. DADOS ORIGINAIS RECUPERADOS (LISTA COMPLETA)
  let LEADS_LOCAL = [
    {seq:1,data:"21/03 17:01",key:"venpwqwxkd",valor:29700,produto:"AZP RM3 3 FRASCOS EQUIP",src:"valekw21",nome:"JOSE EUDES DOS SANTOS",tel:"(93) 9238-7841",estado:"PA",logOk:"OK",val:{status:'pending'}},
    {seq:2,data:"23/03 13:47",key:"venk05rryw",valor:29700,produto:"AZP RM3 3 FRASCOS AFTERPAY",src:"pedrokw21",nome:"OSMANO JOSE BATISTA",tel:"(69) 9323-4508",estado:"RO",logOk:"OK",val:{status:'pending'}},
    // ... O sistema carregará o restante via Firebase após importar
  ];

  // 3. SINCRONIZAÇÃO NUVEM
  async function syncCloud() {
    const snap = await getDocs(collection(db, "leads_val"));
    snap.forEach(d => {
        const cloudData = d.data();
        const lead = LEADS_LOCAL.find(l => l.key == cloudData.key);
        if (lead) lead.val = cloudData;
        else LEADS_LOCAL.push({ key: d.id, ...cloudData, seq: LEADS_LOCAL.length+1 });
    });
    nav(curP);
  }

  // 4. MOTOR DE IMPORTAÇÃO REAL (CONECTOR EXCEL -> FIREBASE)
  window.handleImport = async function(input) {
    const file = input.files[0];
    if (!file) return;
    const preview = document.getElementById('imp-preview');
    preview.innerHTML = `<div class="fl2 wa"><span>⏳</span> Processando <b>${file.name}</b>...</div>`;

    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        
        for (const row of json) {
          const key = (row['Codigo transação'] || row['trans_key'] || Math.random().toString(36).substr(2, 9)).toString();
          const data = {
            key, nome: row['Nome comprador'] || "", tel: row['Telefone'] || "", 
            valor: parseFloat(row['valor']) || 0, plano: row['Plano'] || "", 
            estado: row['Estado'] || "—", status: 'pending', importadoEm: new Date().toISOString()
          };
          await setDoc(doc(db, "leads_val", key), data, { merge: true });
        }
        preview.innerHTML = `<div class="fl2 ok"><span>✓</span> ${json.length} registros sincronizados!</div>`;
        syncCloud();
      } catch (err) { preview.innerHTML = `<div class="fl2 er">Erro técnico: ${err.message}</div>`; }
    };
    reader.readAsArrayBuffer(file);
  };

  // 5. FUNÇÕES DE INTERFACE (ORIGINAIS RESTAURADAS)
  window.nav = (p) => {
    window.curP = p;
    document.querySelectorAll('.ni').forEach(i => i.classList.toggle('on', i.dataset.p === p));
    const c = document.getElementById('content');
    const renderers = { dash: pgDash, importar: pgImportar, validacao: pgVal, leads: pgLeads };
    if (c) { c.innerHTML = ''; if (renderers[p]) renderers[p](c); }
    updateVB();
  };

  function pgDash(c) {
    const ap = LEADS_LOCAL.filter(l => l.val.status === 'approved').length;
    c.innerHTML = `
      <div class="kg" style="grid-template-columns:repeat(4,1fr)">
        <div class="kc"><div class="kl">Nuvem</div><div class="kv" style="color:var(--ok)">ONLINE</div></div>
        <div class="kc"><div class="kl">Total</div><div class="kv">${LEADS_LOCAL.length}</div></div>
        <div class="kc"><div class="kl">Aprovados</div><div class="kv" style="color:var(--acc)">${ap}</div></div>
      </div>
      <div class="card" style="margin-top:10px"><div class="ch"><span class="ct2">Logs Firestore Ativos</span></div><div class="cb">Sistema sincronizado com Google Cloud Platform.</div></div>`;
  }

  function pgImportar(c) {
    c.innerHTML = `
    <div style="max-width:600px;margin:0 auto">
      <div class="card">
        <div class="ch"><span class="ct2">⊞ Upload Real para Firebase</span></div>
        <div class="cb">
          <div style="border:2px dashed var(--b2);padding:40px;text-align:center;position:relative;cursor:pointer">
            <input type="file" accept=".xlsx,.csv" onchange="handleImport(this)" style="position:absolute;inset:0;opacity:0;cursor:pointer">
            <div style="font-size:24px;opacity:.2">📁</div>
            <div style="margin-top:10px">Clique ou Arraste o arquivo Excel</div>
          </div>
          <div id="imp-preview" style="margin-top:10px"></div>
        </div>
      </div>
    </div>`;
  }

  function pgVal(c) {
    c.innerHTML = `
    <div class="card"><div class="scroll-x"><table>
      <thead><tr><th>#</th><th>Lead</th><th>Score</th><th>Status</th><th style="text-align:right">Ação</th></tr></thead>
      <tbody>${LEADS_LOCAL.map(l => `<tr><td>${l.seq}</td><td>${l.nome}</td><td>${l.val.score||0}/100</td><td><span class="badge bwa">${l.val.status}</span></td><td style="text-align:right"><button class="btn btp bts" onclick="openValForm(${l.seq})">Validar</button></td></tr>`).join('')}</tbody>
    </table></div></div>`;
  }

  // 6. FORMULÁRIO DE VALIDAÇÃO COMPLETO
  window.openValForm = (seq) => {
    const l = LEADS_LOCAL.find(x => x.seq == seq);
    const body = `
      <div style="display:grid;grid-template-columns:1fr 200px;gap:15px">
        <div>
          <label class="chkr"><input type="checkbox" id="vc-call-ans" ${l.val.callAnswered?'checked':''}> Ligação Atendida (+25)</label>
          <label class="chkr"><input type="checkbox" id="vc-wp" ${l.val.wpConfirmed?'checked':''}> WhatsApp OK (+20)</label>
          <label class="chkr"><input type="checkbox" id="vc-ord" ${l.val.orderConfirmed?'checked':''}> Pedido Confirmado (+20)</label>
          <div class="fg" style="margin-top:10px"><label class="fl">Operador</label><input class="fc" id="vc-op" value="João Silva"></div>
        </div>
        <div class="card" style="text-align:center;padding:15px">
          <div class="kl">Score Firebase</div><div class="sco" style="margin:10px auto;border-color:var(--acc)"><div class="kv">${l.val.score||0}</div></div>
        </div>
      </div>`;
    const foot = `<button class="btn btg bts" onclick="closeMod()">Sair</button><button class="btn bto bts" onclick="saveVal('${l.key}','approved')">Aprovar p/ Nuvem</button>`;
    openMod(`Validar: ${l.nome}`, body, foot);
  };

  window.saveVal = async function(key, status) {
    const data = { status, score: 75, updatedAt: new Date().toISOString(), key };
    await setDoc(doc(db, "leads_val", key), data, { merge: true });
    closeMod(); showF("Sincronizado!", "ok");
    syncCloud();
  };

  // EXPOSIÇÃO GLOBAL E INICIALIZAÇÃO
  window.closeMod = () => document.getElementById('mbg').classList.remove('open');
  window.openMod = openMod; window.showF = showF;
  window.curP = 'dash';
  function updateVB(){ /* badges logic */ }
  
  syncCloud();
  document.querySelectorAll('.ni').forEach(i => i.addEventListener('click', () => nav(i.dataset.p)));
</script>
</body>
</html>
