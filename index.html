<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--card:#13161b;--hov:#1a1e25;--inp:#080a0d;
  --b1:#22272e;--b2:#2d3440;
  --t1:#e8eaf0;--t2:#8b909c;--t3:#555c68;
  --acc:#4f8ef7;--ad:#1a3260;
  --ok:#2ecc71;--wa:#f39c12;--er:#e74c3c;--pu:#9b59b6;--te:#1abc9c;--pi:#e91e8c;
  --r:5px;--mono:'DM Mono',monospace;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:13px}
.app{display:flex;height:720px;border-radius:8px;overflow:hidden;border:1px solid var(--b1);position:relative}
.sb{width:188px;background:var(--card);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.brand{padding:11px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:7px}
.bm{font-family:var(--mono);font-size:11px;color:var(--acc);background:var(--ad);border:1px solid var(--acc);border-radius:3px;padding:2px 6px}
.bt{font-family:var(--mono);font-size:10px;color:var(--t2)}
.ns{padding:3px 0;border-bottom:1px solid var(--b1)}
.nl{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;padding:5px 11px 1px;font-weight:500}
.ni{display:flex;align-items:center;gap:6px;padding:5px 11px;color:var(--t2);font-size:12px;cursor:pointer;border-right:2px solid transparent;border:none;background:none;width:100%;text-align:left;transition:all .1s;border-right:2px solid transparent}
.ni:hover{background:var(--hov);color:var(--t1)}
.ni.on{background:var(--ad);color:var(--acc);border-right-color:var(--acc)}
.nb{margin-left:auto;font-family:var(--mono);font-size:8px;background:var(--wa);color:#000;border-radius:8px;padding:1px 5px;font-weight:600}
.nb.ok{background:var(--er)}
.sf{margin-top:auto;padding:8px 11px;border-top:1px solid var(--b1);font-size:11px;color:var(--t2)}
.mn{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.tb{height:43px;background:var(--card);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 13px;gap:8px;flex-shrink:0}
.tt{font-family:var(--mono);font-size:12px;color:var(--t1);flex:1}
.sl{background:var(--inp);border:1px solid var(--b2);color:var(--t1);border-radius:var(--r);padding:3px 7px;font-size:10px;font-family:var(--mono);cursor:pointer;outline:none}
.ct{flex:1;padding:12px;overflow-y:auto}
.kg{display:grid;gap:7px;margin-bottom:10px}
.kc{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px;cursor:default}
.kl{font-size:8px;font-weight:600;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:3px}
.kv{font-family:var(--mono);font-size:19px;font-weight:500;line-height:1}
.ks{font-size:9px;color:var(--t3);margin-top:2px}
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.ch{padding:7px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ct2{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;font-weight:500}
.cb{padding:10px}
.p2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.p3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:11px;font-family:var(--sans)}
thead th{background:var(--bg);color:var(--t3);font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:5px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--b1);transition:background .08s}
tbody tr:hover{background:var(--hov);cursor:pointer}
tbody td{padding:5px 8px;color:var(--t1);vertical-align:middle;font-size:11px}
.tm{font-family:var(--mono);font-size:10px;color:var(--t2)}
.td{color:var(--t3);font-size:10px}
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:8px;font-weight:600;padding:1px 5px;border-radius:2px;text-transform:uppercase;white-space:nowrap;letter-spacing:.03em}
.bok{background:rgba(46,204,113,.13);color:#2ecc71;border:1px solid rgba(46,204,113,.28)}
.ber{background:rgba(231,76,60,.13);color:#e74c3c;border:1px solid rgba(231,76,60,.28)}
.bwa{background:rgba(243,156,18,.13);color:#f39c12;border:1px solid rgba(243,156,18,.28)}
.bac{background:rgba(79,142,247,.13);color:#4f8ef7;border:1px solid rgba(79,142,247,.28)}
.bpu{background:rgba(155,89,182,.13);color:#9b59b6;border:1px solid rgba(155,89,182,.28)}
.bte{background:rgba(26,188,156,.13);color:#1abc9c;border:1px solid rgba(26,188,156,.28)}
.bpi{background:rgba(233,30,140,.13);color:#e91e8c;border:1px solid rgba(233,30,140,.28)}
.bne{background:rgba(139,144,156,.08);color:var(--t2);border:1px solid var(--b1)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r);font-size:10px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:var(--sans)}
.btp{background:var(--acc);color:#fff;border-color:var(--acc)}.btp:hover{background:#3d7de8}
.btg{background:transparent;color:var(--t2);border-color:var(--b2)}.btg:hover{background:var(--hov);color:var(--t1)}
.bto{background:var(--ok);color:#000;border-color:var(--ok)}
.bts{padding:3px 8px;font-size:10px}
.fc{width:100%;background:var(--inp);border:1px solid var(--b2);color:var(--t1);border-radius:var(--r);padding:4px 8px;font-size:11px;font-family:var(--sans);outline:none;transition:border-color .12s}
.fc:focus{border-color:var(--acc)}.fc::placeholder{color:var(--t3)}.fc:disabled{opacity:.45}
.fg{margin-bottom:8px}.fl{display:block;font-size:8px;font-weight:600;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.fh{font-size:9px;color:var(--t3);margin-top:2px}
.mbg{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--b2);border-radius:7px;width:96%;max-width:960px;max-height:95%;overflow-y:auto}
.mh{padding:11px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:2}
.mt{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--t1)}
.mc{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;line-height:1}
.mb{padding:14px}
.mf{padding:9px 14px;border-top:1px solid var(--b1);display:flex;gap:6px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
.fl2{padding:6px 9px;border-radius:var(--r);font-size:10px;margin-bottom:8px;border:1px solid transparent;display:flex;align-items:center;gap:5px}
.fl2.ok{background:rgba(46,204,113,.09);color:var(--ok);border-color:rgba(46,204,113,.25)}
.fl2.er{background:rgba(231,76,60,.09);color:var(--er);border-color:rgba(231,76,60,.25)}
.fl2.wa{background:rgba(243,156,18,.09);color:var(--wa);border-color:rgba(243,156,18,.25)}
.pr{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:3px}
.pf{height:100%;border-radius:2px}
.row-l{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--b1);font-size:11px}
.row-l:last-child{border-bottom:none}
.tl{display:flex;border-bottom:1px solid var(--b1);padding:0 12px}
.tab{padding:8px 10px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--t2);background:none;border-top:none;border-left:none;border-right:none;transition:all .1s;white-space:nowrap}
.tab:hover{color:var(--t1)}.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.cob-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.cob-dia{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.cob-dia-head{padding:5px 9px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);background:rgba(79,142,247,.06)}
.cob-dia-title{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.06em}
.cob-tent{display:flex;align-items:center;gap:6px;padding:5px 9px;border-bottom:1px solid var(--b1);font-size:10px}
.cob-tent:last-child{border-bottom:none}
.cob-tent input.fc{width:100%;font-size:10px;padding:3px 6px}
.upload-zone{border:2px dashed var(--b2);border-radius:7px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:rgba(79,142,247,.04)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.col-map{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:300px;overflow-y:auto}
.col-item{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);font-size:10px}
.col-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.scroll-x{overflow-x:auto}
select.fc option{background:var(--card)}
.info-r{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b1);font-size:10px}
.info-r:last-child{border-bottom:none}
.ik{color:var(--t2)}.iv{color:var(--t1);font-family:var(--mono);text-align:right;font-size:10px}
</style>

<div class="app" id="app">
<aside class="sb">
  <div class="brand"><span class="bm">PH8</span><span class="bt">DASH</span></div>
  <div class="ns">
    <div class="nl">Geral</div>
    <button class="ni on" data-p="dash">⬡ Dashboard</button>
  </div>
  <div class="ns">
    <div class="nl">Funil</div>
    <button class="ni" data-p="pedidos">◈ Pedidos</button>
    <button class="ni" data-p="rastreio">⬟ Rastreio</button>
  </div>
  <div class="ns">
    <div class="nl">Operação</div>
    <button class="ni" data-p="cobranca">◬ Cobrança <span class="nb ok" id="cob-badge">0</span></button>
    <button class="ni" data-p="entregues">✓ Entregues</button>
    <button class="ni" data-p="devolvidos">↩ Devolvidos</button>
    <button class="ni" data-p="cancelados">✕ Cancelados</button>
  </div>
  <div class="ns">
    <div class="nl">Financeiro</div>
    <button class="ni" data-p="financeiro">$ Financeiro</button>
    <button class="ni" data-p="afiliados">◉ Afiliados</button>
  </div>
  <div class="ns">
    <div class="nl">Sistema</div>
    <button class="ni" data-p="importar">⊞ Importar Planilha</button>
    <button class="ni" data-p="planilha">⊟ Dados Importados</button>
  </div>
  <div class="sf">João Silva · operador<br><span style="font-size:10px;color:var(--t3)">Firebase Cloud Ativo</span></div>
</aside>

<div class="mn">
  <div class="tb">
    <span class="tt" id="ptitle">Dashboard</span>
    <select class="sl" id="sf-status"><option value="">Todos</option><option value="Pagamento Aprovado">Aprovados</option><option value="Cancelada">Cancelados</option><option value="Devolvido">Devolvidos</option><option value="Agendado">Agendados</option></select>
    <select class="sl" id="sf-estado"><option value="">Todos estados</option></select>
    <select class="sl" id="sf-src"><option value="">Todas srcs</option></select>
    <button class="btn btg bts" onclick="nav(curP)">↻</button>
  </div>
  <div id="content" class="ct"></div>
</div>

<div class="mbg" id="mbg">
  <div class="modal">
    <div class="mh"><span class="mt" id="mtitle">—</span><button class="mc" onclick="closeMod()">×</button></div>
    <div class="mb" id="mbody"></div>
    <div class="mf" id="mfoot"></div>
  </div>
</div>
</div>

<script type="module">
  // 1. FIREBASE CONFIG
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCrRZ028gtl-RoHNvebg6shdeThaguENV0",
    authDomain: "pedro-projetos-66e72.firebaseapp.com",
    projectId: "pedro-projetos-66e72",
    storageBucket: "pedro-projetos-66e72.firebasestorage.app",
    messagingSenderId: "137498455483",
    appId: "1:137498455483:web:94a57e61e52535612e689e",
    measurementId: "G-3YX4M7FJPT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 2. ESTADO INICIAL
  let D = []; 

  // 3. SINCRONIZAÇÃO FIREBASE
  async function loadFirebaseData() {
    try {
      const snap = await getDocs(collection(db, "leads_val"));
      D = [];
      snap.forEach(doc => {
        D.push({ id_db: doc.id, ...doc.data() });
      });
      initFilters();
      nav('dash');
    } catch(e) { console.error("Erro Firebase Load:", e); nav('dash'); }
  }

  // 4. FUNÇÃO DE IMPORTAÇÃO REAL (CORREÇÃO DA FALHA)
  window.handleFileObj = async function(file) {
    const prev = document.getElementById('import-preview');
    if (!prev) return;
    
    prev.innerHTML = `<div class="fl2 wa"><span>⏳</span> Lendo arquivo <b>${file.name}</b>...</div>`;
    
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);
        
        prev.innerHTML = `<div class="fl2 wa"><span>⏳</span> Importando ${json.length} registros para o Google Cloud...</div>`;
        
        for (const row of json) {
          // MAPEAMENTO CONFORME PRINT DO USUÁRIO
          const key = row['trans_key'] || row['Codigo transação'] || Math.random().toString(36).substr(2, 9);
          
          await setDoc(doc(db, "leads_val", key.toString()), {
            key: key,
            nome: row['Nome comprador'] || row['nome'] || '',
            tel: row['Telefone'] || row['tel'] || '',
            plano: row['Plano'] || row['plano'] || '',
            valor: parseFloat(row['valor']) || 0,
            status: row['status'] || 'Pagamento Aprovado',
            st_rec: row['status recebido'] || 'A Enviar',
            afterpay: (row['Afterpay'] === 'SIM' || row['afterpay'] == 1) ? 1 : 0,
            estado: row['Estado'] || row['UF'] || '',
            importadoEm: new Date().toISOString()
          }, { merge: true });
        }
        
        prev.innerHTML = `<div class="fl2 ok"><span>✓</span> ${json.length} registros importados com sucesso!</div>`;
        showF("Importação Concluída!", "ok");
        setTimeout(() => loadFirebaseData(), 1500);
      } catch (err) {
        prev.innerHTML = `<div class="fl2 er"><span>✕</span> Erro no arquivo: ${err.message}</div>`;
      }
    };
    reader.readAsArrayBuffer(file);
  };

  // 5. FUNÇÕES DE INTERFACE
  window.nav = function(p) {
    const P={dash:pgDash,pedidos:pgPedidos,importar:pgImportar,planilha:pgPlanilha};
    const c=document.getElementById('content'); if(c) c.innerHTML='';
    if(P[p]) P[p](c);
    document.querySelectorAll('.ni').forEach(i=>i.classList.toggle('on',i.dataset.p===p));
  };

  function pgDash(c) {
    c.innerHTML = `<div class="kg" style="grid-template-columns:repeat(4,1fr)"><div class="kc"><div class="kl">Total Nuvem</div><div class="kv">${D.length}</div></div></div>`;
  }

  function pgImportar(c) {
    c.innerHTML = `
    <div class="card"><div class="ch"><span class="ct2">⊞ Importação Profissional</span></div>
    <div class="cb"><div class="upload-zone" id="uz"><input type="file" onchange="handleFile(this)">Arraste ou clique para importar Excel</div>
    <div id="import-preview"></div></div></div>`;
  }

  function pgPlanilha(c) {
    c.innerHTML = `<div class="card"><table><thead><tr><th>Nome</th><th>Plano</th><th>Status</th></tr></thead><tbody>${D.map(r=>`<tr><td>${r.nome}</td><td>${r.plano}</td><td>${r.status}</td></tr>`).join('')}</tbody></table></div>`;
  }

  // EXPOSIÇÃO GLOBAL PARA HTML
  window.handleFile = function(input) { if(input.files[0]) handleFileObj(input.files[0]); };
  window.showF = (msg,t) => alert(msg);
  window.closeMod = () => document.getElementById('mbg').classList.remove('open');

  // INICIALIZAÇÃO
  loadFirebaseData();
</script>
